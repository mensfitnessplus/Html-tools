<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f13" />
  <meta name="description" content="Your personal offline toolbox. Upload HTML tools and launch them anywhere." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tool Hub" />
  <title>Tool Hub</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="hub" class="screen active">

    <header class="hub-header">
      <div class="header-top">
        <div class="brand">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="3" width="8" height="8" rx="1.5"/>
            <rect x="14" y="3" width="8" height="8" rx="1.5"/>
            <rect x="2" y="13" width="8" height="8" rx="1.5"/>
            <rect x="14" y="13" width="8" height="8" rx="1.5"/>
          </svg>
          <span class="brand-name">Tool Hub</span>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="viewBookmarksBtn" aria-label="Bookmarks" title="Bookmarks">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
          </button>
          
          <div id="sortWrap" class="filter-wrap hidden">
            <button class="icon-btn filter-btn" id="sortBtn" aria-label="Sort Bookmarks">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="4" x2="12" y2="20"/><polyline points="18 14 12 20 6 14"/><polyline points="18 10 12 4 6 10" style="opacity:0.3"/></svg>
              <span id="sortLabel">Sort</span>
            </button>
            <div id="sortDropdown" class="dropdown hidden">
              <button class="dropdown-item active" data-sort="manual">Manual / Drag</button>
              <button class="dropdown-item" data-sort="recent_open">Recently Opened</button>
              <button class="dropdown-item" data-sort="most_open">Most Opened</button>
              <button class="dropdown-item" data-sort="recent_mod">Recently Modified</button>
              <button class="dropdown-item" data-sort="date_add">Date Added</button>
              <button class="dropdown-item" data-sort="alpha_asc">Alphabetical (A-Z)</button>
              <button class="dropdown-item" data-sort="alpha_desc">Alphabetical (Z-A)</button>
            </div>
          </div>

          <div id="filterWrap" class="filter-wrap hidden">
            <button class="icon-btn filter-btn" id="filterBtn" aria-label="Filter Tools">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
              <span id="filterLabel">All</span>
            </button>
            <div id="filterDropdown" class="dropdown hidden">
              <button class="dropdown-item" data-filter="all">All</button>
              <button class="dropdown-item" data-filter="html">HTML</button>
              <button class="dropdown-item" data-filter="url">URL</button>
            </div>
          </div>
          <button class="icon-btn" id="menuBtn" title="More options" aria-label="More options">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
        <input type="search" id="searchInput" placeholder="Search tools…" autocomplete="off" />
        <button class="search-clear" id="searchClear" aria-label="Clear search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="tool-grid-wrap">
      <div id="tagsWrap" class="tags-wrap hidden"></div>
      <div id="toolGrid" class="tool-grid"></div>
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">
          <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="8" y="8" width="20" height="20" rx="3"/>
            <rect x="36" y="8" width="20" height="20" rx="3"/>
            <rect x="8" y="36" width="20" height="20" rx="3"/>
            <rect x="36" y="36" width="20" height="20" rx="3"/>
          </svg>
        </div>
        <p class="empty-title">No tools yet</p>
        <p class="empty-sub">Tap <strong>+</strong> to add your first tool</p>
      </div>
      <div id="noResults" class="empty-state hidden">
        <div class="empty-icon">
          <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="28" cy="28" r="16"/><line x1="40" y1="40" x2="56" y2="56"/>
            <line x1="22" y1="28" x2="34" y2="28" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="empty-title">No matches</p>
        <p class="empty-sub">Try a different search term</p>
      </div>
    </main>

    <button id="addUrlFab" class="fab secondary-fab hidden" title="Quick Add URL" aria-label="Quick Add URL">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    </button>
    <button id="addBtn" class="fab" title="Add tool" aria-label="Add tool">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>

  <div id="viewer" class="screen">
    <div id="toolLoader" class="tool-loader" aria-hidden="true">
      <div class="tool-loader__spinner"></div>
      <p class="tool-loader__text">Loading tool...</p>
    </div>
    <div id="frameContainer" class="frame-container"></div>
    <div id="tabBar" class="tab-bar">
      <div id="tabList" class="tab-list"></div>
    </div>
  </div>

  <div id="menuDropdown" class="dropdown hidden">
    <button class="dropdown-item" id="tabsToggleBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M2 7h20"/><path d="M7 3v4"/></svg>
      <span id="tabsToggleLabel">Multi-tab: On</span>
    </button>
    <div class="context-divider"></div>
    <button class="dropdown-item" id="urlSupportToggleBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span id="urlSupportToggleLabel">URL Support: Off</span>
    </button>
    <div class="context-divider"></div>
    <button class="dropdown-item" id="exportBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export all tools
    </button>
    <button class="dropdown-item" id="importBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import backup
    </button>
  </div>
  <div id="menuOverlay" class="overlay hidden"></div>

  <div id="addSheet" class="sheet hidden" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <h2 class="sheet-title" id="sheetTitle">Add Tool</h2>

      <div class="field-group hidden" id="toolTypeGroup">
        <label class="field-label">Tool Type</label>
        <div class="type-radios">
          <label><input type="radio" name="toolType" value="html" checked> <span>HTML</span></label>
          <label><input type="radio" name="toolType" value="url"> <span>URL</span></label>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Name</label>
        <div class="input-wrap">
          <input type="text" id="toolNameInput" class="field-input" placeholder="My Awesome Tool" maxlength="60" />
          <button class="input-clear hidden" id="toolNameClearBtn" aria-label="Clear"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
      </div>

      <div class="field-group" id="htmlFileGroup">
        <label class="field-label">HTML File <span class="required" id="htmlRequired">*</span></label>
        <label class="file-pick" id="htmlPickLabel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span id="htmlPickText">Choose .html file</span>
          <input type="file" id="htmlFileInput" accept=".html,text/html" hidden />
        </label>
      </div>

      <div class="field-group hidden" id="urlInputGroup">
        <label class="field-label">URL <span class="required">*</span></label>
        <div class="input-wrap">
          <input type="url" id="urlInput" class="field-input" placeholder="https://example.com" />
          <button class="input-clear hidden" id="urlClearBtn" aria-label="Clear"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
      </div>

      <div class="field-group hidden" id="bookmarkGroup">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--text); font-size: .95rem;">
          <input type="checkbox" id="isBookmarkCheckbox" checked style="width:18px;height:18px;accent-color:var(--accent);">
          <span>Save as Bookmark</span>
        </label>
      </div>

      <div class="field-group hidden" id="tagsGroup">
        <label class="field-label">Tags <span class="optional">(comma separated)</span></label>
        <div style="position: relative;">
          <input type="text" id="tagsInput" class="field-input" placeholder="design, dev, reading" autocomplete="off" />
          <div id="tagsSuggestionBox" class="tags-suggestion-box hidden"></div>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Icon <span class="optional">(optional)</span></label>
        <div class="icon-pick-row">
          <div class="icon-preview-wrap">
            <img id="iconPreview" class="icon-preview hidden" alt="icon preview" />
            <div id="iconPlaceholder" class="icon-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </div>
          </div>
          <label class="file-pick icon-file-pick">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span>Choose image</span>
            <input type="file" id="iconFileInput" accept="image/png,image/jpeg,image/webp" hidden />
          </label>
          <button class="ghost-btn" id="fetchIconBtn" style="display:none">Fetch URL Icon</button>
          <button class="ghost-btn" id="clearIconBtn" style="display:none">Remove</button>
        </div>
      </div>

      <div class="sheet-actions">
        <button class="btn-secondary" id="cancelSheetBtn">Cancel</button>
        <button class="btn-primary" id="saveToolBtn">Save Tool</button>
      </div>
    </div>
  </div>
  <div id="sheetOverlay" class="overlay hidden"></div>

  <div id="toolMenu" class="context-menu hidden" role="menu">
    <button class="context-item" id="ctxRename" role="menuitem">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Rename
    </button>
    <button class="context-item" id="ctxUpdateHtml" role="menuitem">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5.1L1 10"/></svg>
      Update HTML
    </button>
    <button class="context-item hidden" id="ctxUpdateUrl" role="menuitem">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Edit Settings
    </button>
    <button class="context-item" id="ctxChangeIcon" role="menuitem">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Change Icon
    </button>
    
    <!-- New Bookmark specific options -->
    <button class="context-item hidden" id="ctxPin" role="menuitem">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L12 10M12 22L12 14M10 2L14 2M10 22L14 22M6 10L18 10C19.1046 10 20 10.8954 20 12V14C20 15.1046 19.1046 16 18 16L6 16C4.89543 16 4 15.1046 4 14V12C4 10.8954 4.89543 10 6 10Z"/></svg>
      <span id="ctxPinText">Pin Bookmark</span>
    </button>
    <button class="context-item hidden" id="ctxCopyUrl" role="menuitem">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy URL
    </button>
    <button class="context-item hidden" id="ctxOpenExternal" role="menuitem">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Open in Browser
    </button>
    
    <div class="context-divider"></div>
    <button class="context-item danger" id="ctxDelete" role="menuitem">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      Delete
    </button>
  </div>
  <div id="toolMenuOverlay" class="overlay hidden"></div>

  <div id="renameDialog" class="dialog-wrap hidden" role="dialog" aria-modal="true">
    <div class="dialog">
      <h3 class="dialog-title">Rename Tool</h3>
      <input type="text" id="renameInput" class="field-input" maxlength="60" />
      <div class="dialog-actions">
        <button class="btn-secondary" id="cancelRenameBtn">Cancel</button>
        <button class="btn-primary" id="confirmRenameBtn">Rename</button>
      </div>
    </div>
  </div>

  <div id="deleteDialog" class="dialog-wrap hidden" role="dialog" aria-modal="true">
    <div class="dialog">
      <h3 class="dialog-title">Delete Tool?</h3>
      <p class="dialog-body" id="deleteDialogBody"></p>
      <div class="dialog-actions">
        <button class="btn-secondary" id="cancelDeleteBtn">Cancel</button>
        <button class="btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <input type="file" id="updateHtmlInput" accept=".html,text/html" hidden />
  <input type="file" id="changeIconInput" accept="image/png,image/jpeg,image/webp" hidden />
  <input type="file" id="importInput" accept=".json,application/json" hidden />

  <script src="app.js"></script>
</body>
</html>
